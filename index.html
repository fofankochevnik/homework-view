<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Домашка — 4Б</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07070d;
    --surface: #0e0e18;
    --border: #1a1a28;
    --accent: #6d28d9;
    --accent2: #9333ea;
    --text: #dde2f0;
    --muted: #555570;
    --tag-bg: rgba(109,40,217,.15);
    --tag-color: #a78bfa;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    padding: 40px 20px 60px;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 300px;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(109,40,217,.18) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 36px;
  }

  .klass {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 26px;
    font-weight: 700;
    background: linear-gradient(90deg, #fff, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #count {
    display: inline-block;
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    font-size: 13px;
  }

  thead tr {
    background: rgba(109,40,217,.12);
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 12px 16px;
    text-align: left;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,.02); }

  td {
    padding: 14px 16px;
    vertical-align: top;
    line-height: 1.55;
  }

  .td-date {
    color: var(--muted);
    white-space: nowrap;
    font-size: 12px;
    min-width: 110px;
  }

  .td-subject .tag {
    display: inline-block;
    background: var(--tag-bg);
    color: var(--tag-color);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 11px;
    white-space: nowrap;
  }

  .td-task { color: #b0b4cc; max-width: 260px; }
  .td-answer { color: var(--text); max-width: 280px; }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 13px;
  }

  .dot {
    display: inline-block;
    animation: blink 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: .2; }
    40% { opacity: 1; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="klass">4Б · Домашние задания</div>
    <h1>Домашка</h1>
    <span id="count"></span>
  </header>

  <table id="table">
    <thead>
      <tr>
        <th>Дата</th>
        <th>Предмет</th>
        <th>Задание</th>
        <th>Ответ</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr>
        <td colspan="4" class="loading">
          Загружаю<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<script>
async function load() {
  const tbody = document.getElementById("tbody");
  const count = document.getElementById("count");

  try {
    const res = await fetch("data/homework.json?t=" + Date.now());
    if (!res.ok) throw new Error();
    const data = await res.json();

    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">Пока пусто 👀</td></tr>';
      count.textContent = "0 заданий";
      return;
    }

    count.textContent = data.length + " " + plural(data.length, "задание", "задания", "заданий");

    tbody.innerHTML = data.map(item => `
      <tr>
        <td class="td-date">${item.date}<br><span style="opacity:.5">${item.time || ""}</span></td>
        <td class="td-subject"><span class="tag">${esc(item.subject)}</span></td>
        <td class="td-task">${esc(item.task)}</td>
        <td class="td-answer">${esc(item.answer)}</td>
      </tr>
    `).join("");
  } catch {
    tbody.innerHTML = '<tr><td colspan="4" class="empty">Не удалось загрузить данные</td></tr>';
  }
}

function esc(s) {
  return String(s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function plural(n, one, few, many) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return one;
  if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return few;
  return many;
}

load();
</script>
</body>
</html>
